<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Techno Managerial Atlas — offline interview prep across HLD, LLD, data engineering, delivery risk, stakeholders, rubrics, simulator, quizzes, flashcards, and model answers." />
  <meta name="theme-color" content="#0b0e14" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" href="icon.svg" />
  <title>TechLead · The Techno Managerial Atlas</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>
  <div class="bg-noise" aria-hidden="true"></div>

  <a href="#main" class="skip-link">Skip to content</a>

  <header class="topbar">
    <button class="icon-btn nav-toggle" id="navToggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <a class="brand" href="#/" aria-label="TechLead home">
      <svg class="brand-mark" viewBox="0 0 100 100" aria-hidden="true">
        <path d="M22 70 L50 22 L78 70 M34 70 L50 44 L66 70 M24 80 H76" />
      </svg>
      <span class="brand-text">TechLead<em>the techno managerial atlas</em></span>
    </a>

    <a class="atlas-home-top" href="../index.html" aria-label="Atlas Home">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>
      <span>Atlas Home</span>
    </a>

    <div class="search-wrap">
      <svg class="search-ico" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
      <input id="search" type="search" placeholder="Search lessons, scenarios, rubrics...  (press /)" autocomplete="off" aria-label="Search concepts" />
      <kbd class="search-kbd">/</kbd>
      <div id="searchResults" class="search-results" role="listbox" hidden></div>
    </div>

    <div class="topbar-actions">
      <div class="progress-pill" id="progressPill" title="Your overall progress">
        <svg viewBox="0 0 36 36" class="progress-ring" aria-hidden="true">
          <circle class="pr-track" cx="18" cy="18" r="15.5"></circle>
          <circle class="pr-value" id="prValue" cx="18" cy="18" r="15.5"></circle>
        </svg>
        <span id="progressText">0%</span>
      </div>
      <button class="cmdk-btn" id="cmdkBtn" type="button" aria-label="Open command palette" title="Command palette (Cmd/Ctrl-K)">⌘K</button>
      <button class="icon-btn" id="themeToggle" type="button" aria-label="Toggle light / dark theme" title="Toggle theme" aria-pressed="false">
        <svg class="ico-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle><g class="rays"><line x1="12" y1="1" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="23"/><line x1="1" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="23" y2="12"/><line x1="4.2" y1="4.2" x2="6.3" y2="6.3"/><line x1="17.7" y1="17.7" x2="19.8" y2="19.8"/><line x1="4.2" y1="19.8" x2="6.3" y2="17.7"/><line x1="17.7" y1="6.3" x2="19.8" y2="4.2"/></g></svg>
        <svg class="ico-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
      </button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar" aria-label="Curriculum navigation">
      <nav id="nav" class="nav"></nav>
      <div class="sidebar-foot">
        <button class="foot-link feature-toggle" id="featureToggle" type="button" aria-controls="featurePane" aria-expanded="false">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16M4 12h16M4 19h10"/></svg>
          Features
        </button>
      </div>
    </aside>

    <aside class="feature-pane" id="featurePane" aria-label="Feature navigation" hidden>
      <div class="feature-pane-head">
        <span>Features</span>
        <button class="feature-pane-close" id="featurePaneClose" type="button" aria-label="Close features">×</button>
      </div>
      <nav class="feature-list">
        <a href="#/practice"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19V5a2 2 0 0 1 2-2h12v18H6a2 2 0 0 1-2-2zM8 7h6M8 11h6M8 15h4"/></svg><span>Practice library</span></a>
        <a href="#/rubrics"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19h16M7 16V8M12 16V5M17 16v-6"/></svg><span>Rubrics</span></a>
        <a href="#/interview"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8v5l3 2"/><circle cx="12" cy="12" r="9"/></svg><span>Interview simulator</span></a>
        <a href="#/quiz"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>Quiz mode</span></a>
        <a href="#/flashcards"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg><span>Flashcards</span></a>
        <a href="#/models"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16M4 12h16M4 19h11"/></svg><span>Model answers</span></a>
        <a href="#/companies"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 21h18M6 21V7l6-4 6 4v14M9 10h.01M12 10h.01M15 10h.01"/></svg><span>Company packs</span></a>
        <a href="#/story-bank"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16v16H4zM8 8h8M8 12h8M8 16h5"/></svg><span>Story bank</span></a>
      </nav>
      <div class="feature-utilities">
        <div class="foot-backup">
          <button id="exportData" class="ghost-btn ghost-sm" type="button" title="Download a backup of your progress">Export</button>
          <button id="importData" class="ghost-btn ghost-sm" type="button" title="Restore progress from a backup file">Import</button>
          <input id="importFile" type="file" accept="application/json,.json" hidden aria-hidden="true" />
        </div>
        <button id="resetProgress" class="ghost-btn" type="button">Reset progress</button>
      </div>
    </aside>

    <div class="scrim" id="scrim" hidden></div>
    <main id="main" class="main" tabindex="-1"></main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="js/content.js" defer></script>
  <script src="js/app.js" defer></script>
  <script>
    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
