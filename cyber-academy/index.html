<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Citadel — an interactive atlas for mastering cybersecurity: security foundations (CIA triad, threat modeling, risk), applied cryptography (AES, RSA, hashing, TLS, PKI), web & application security (the OWASP Top 10, XSS, SQL injection, CSRF, access control), and network defense & operations (firewalls, zero trust, detection, incident response). Learn by reading, then by doing — with interactive labs and quizzes." />
  <meta name="theme-color" content="#0a0f0d" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Citadel · The Cybersecurity Atlas</title>

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/track-reversing.css" />
  <link rel="stylesheet" href="css/attack-matrix.css" />
  <link rel="stylesheet" href="css/exam.css" />
  <link rel="stylesheet" href="css/pwa.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0f0d'/%3E%3Cpath d='M50 16 L80 28 V52 C80 70 67 81 50 87 C33 81 20 70 20 52 V28 Z' fill='none' stroke='%2334d399' stroke-width='6' stroke-linejoin='round'/%3E%3Ccircle cx='50' cy='46' r='7' fill='none' stroke='%23818cf8' stroke-width='5'/%3E%3Cpath d='M50 53 V66' stroke='%23818cf8' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E" />
</head>
<body>
  <!-- Atmospheric layers -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>
  <div class="bg-noise" aria-hidden="true"></div>

  <!-- Skip link for a11y -->
  <a href="#main" class="skip-link">Skip to content</a>

  <!-- Top bar -->
  <header class="topbar">
    <button class="icon-btn nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <a class="brand" href="#/" aria-label="Citadel home">
      <svg class="brand-mark" viewBox="0 0 100 100" aria-hidden="true">
        <path class="bm-shield" d="M50 14 L82 26 V52 C82 71 68 82 50 88 C32 82 18 71 18 52 V26 Z" />
        <circle class="bm-lock" cx="50" cy="45" r="8" />
        <path class="bm-lock" d="M50 53 V68" stroke-linecap="round" />
      </svg>
      <span class="brand-text">Citadel<em>the cybersecurity atlas</em></span>
    </a>

    <div class="search-wrap">
      <svg class="search-ico" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
      <input id="search" type="search" placeholder="Search concepts…  (press /)" autocomplete="off" aria-label="Search concepts" />
      <kbd class="search-kbd">/</kbd>
      <div id="searchResults" class="search-results" role="listbox" hidden></div>
    </div>

    <div class="topbar-actions">
      <div class="progress-pill" id="progressPill" title="Your overall progress">
        <svg viewBox="0 0 36 36" class="progress-ring" aria-hidden="true">
          <circle class="pr-track" cx="18" cy="18" r="15.5"></circle>
          <circle class="pr-value" id="prValue" cx="18" cy="18" r="15.5"></circle>
        </svg>
        <span id="progressText">0%</span>
      </div>
      <button class="cmdk-btn" id="cmdkBtn" aria-label="Open command palette" title="Command palette (Cmd/Ctrl-K)">⌘K</button>
      <button class="icon-btn" id="themeToggle" aria-label="Toggle light / dark theme" title="Toggle theme">
        <svg class="ico-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle><g class="rays"><line x1="12" y1="1" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="23"/><line x1="1" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="23" y2="12"/><line x1="4.2" y1="4.2" x2="6.3" y2="6.3"/><line x1="17.7" y1="17.7" x2="19.8" y2="19.8"/><line x1="4.2" y1="19.8" x2="6.3" y2="17.7"/><line x1="17.7" y1="6.3" x2="19.8" y2="4.2"/></g></svg>
        <svg class="ico-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
      </button>
    </div>
  </header>

  <div class="layout">
    <!-- Sidebar navigation (built by JS) -->
    <aside class="sidebar" id="sidebar" aria-label="Curriculum navigation">
      <nav id="nav" class="nav"></nav>
      <div class="sidebar-foot">
        <a href="#/paths" class="foot-link" id="pathsLink">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 3 3 6v15l6-3 6 3 6-3V3l-6 3-6-3zM9 3v15M15 6v15"/></svg>
          Learning paths
        </a>
        <a href="#/scenarios" class="foot-link" id="practiceLibraryLink">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16M4 12h16M4 19h10"/></svg>
          Practice library
        </a>
        <a href="#/review" class="foot-link" id="studyListLink">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l3 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.9 21l1.2-6.8-5-4.9 6.9-1z"/></svg>
          Study list
        </a>
        <a href="#/exam" class="foot-link" id="examLink">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Exam mode
        </a>
        <a href="#/flashcards" class="foot-link" id="flashcardsLink">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg>
          Flashcards
        </a>
        <div class="foot-backup">
          <button id="exportData" class="ghost-btn ghost-sm" title="Download a backup of your progress">Export</button>
          <button id="importData" class="ghost-btn ghost-sm" title="Restore progress from a backup file">Import</button>
          <input id="importFile" type="file" accept="application/json,.json" hidden aria-hidden="true" />
        </div>
        <button id="resetProgress" class="ghost-btn">Reset progress</button>
        <p class="sidebar-credit">Built for engineers who defend what they ship. Press <kbd>?</kbd> for shortcuts.</p>
      </div>
    </aside>
    <div class="scrim" id="scrim" hidden></div>

    <!-- Main content (built by JS) -->
    <main id="main" class="main" tabindex="-1"></main>
  </div>

  <!-- Toast region -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Scripts: order matters -->
  <script src="js/widgets.js" defer></script>
  <script src="js/widgets-crypto.js" defer></script>
  <script src="js/widgets-ext.js" defer></script>
  <script src="js/widgets-rev.js" defer></script>
  <script src="js/widgets-attack-matrix.js" defer></script>
  <script src="js/quizzes.js" defer></script>
  <script src="js/quizzes-ext.js" defer></script>
  <script src="js/quizzes-rev.js" defer></script>
  <script src="js/curriculum-core.js" defer></script>
  <script src="js/curriculum-crypto.js" defer></script>
  <script src="js/curriculum-appsec.js" defer></script>
  <script src="js/curriculum-defense.js" defer></script>
  <script src="js/curriculum-offensive.js" defer></script>
  <script src="js/curriculum-threats.js" defer></script>
  <script src="js/curriculum-domains.js" defer></script>
  <script src="js/curriculum-reversing.js" defer></script>
  <script src="js/practice-content.js" defer></script>
  <script src="js/exam.js" defer></script>
  <script src="js/pwa.js" defer></script>
  <script src="js/app.js" defer></script>
  <script>
    // Register the service worker for full offline support (no-op on file://).
    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () { /* offline-by-nature anyway */ });
      });
    }
  </script>
</body>
</html>
